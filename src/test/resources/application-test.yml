spring:
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    baseline-on-migrate: true
  kafka:
    # 미사용(audit.kafka.enabled=false). 파이프라인 테스트는 @EmbeddedKafka로 오버라이드한다.
    bootstrap-servers: localhost:9092
  batch:
    jdbc:
      initialize-schema: never  # Flyway(V8)가 배치 스키마 생성

settlement:
  batch:
    scheduled:
      enabled: false            # 테스트에선 스케줄러 비활성(잡은 JobLauncherTestUtils로 수동 실행)

audit:
  kafka:
    enabled: false          # 테스트 기본: 브로커 없이 DirectOutboxRelay 사용
    retry:                  # EmbeddedKafka 테스트: 빠르게 재시도 소진 후 DLT(20s await 내)
      initial-ms: 100
      multiplier: 2.0
      max-interval-ms: 300
      max-elapsed-ms: 800
  outbox:
    poll-ms: 600000         # 백그라운드 폴링 사실상 비활성 → 테스트는 relayOnce()를 수동 호출
    max-attempts: 3         # 테스트에서 격리 임계 낮춤
    reconcile-ms: 600000    # 백그라운드 재조정 사실상 비활성 → 테스트는 reconcileOnce()를 수동 호출
    reconcile-grace-ms: 0   # 테스트: 방금 만든 행도 즉시 재조정 대상
