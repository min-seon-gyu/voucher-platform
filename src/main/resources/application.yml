spring:
  datasource:
    url: jdbc:mysql://localhost:3306/voucher?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false
  data:
    redis:
      host: localhost
      port: 6379
  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  metrics:
    tags:
      application: voucher-platform
    distribution:
      percentiles-histogram:
        http.server.requests: true
        lock.acquisition.duration: true
        voucher.redemption.duration: true
      slo:
        http.server.requests: 10ms,50ms,100ms,200ms,500ms,1s,2s
