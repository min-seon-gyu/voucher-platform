spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:voucher}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  flyway:
    enabled: true
    baseline-on-migrate: true
  batch:
    job:
      enabled: false            # 起動 시 자동 실행 방지 — 엔드포인트/스케줄러로만 트리거
    jdbc:
      initialize-schema: never  # Flyway(V8)가 배치 메타 스키마의 단일 진실의 원천
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      properties:
        max.block.ms: 5000          # 브로커 미가용 시 빠르게 실패 — 블로킹 send가 스케줄러 스레드를 장기 점유하지 않도록
        delivery.timeout.ms: 10000
        request.timeout.ms: 5000
  task:
    scheduling:
      # outbox relay의 블로킹 send가 다른 @Scheduled(만료 배치·원장 정합성 검증 등)를 기아시키지 않도록 풀 확대.
      pool:
        size: 5

point:
  earn-rate: "0.01"

# 결산 주기 일괄 정산 배치
settlement:
  batch:
    scheduled:
      enabled: true             # 매일 03:00 KST 전일 결산 자동 실행(스케줄러)

server:
  port: 8080

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{requestId:-}] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
  metrics:
    tags:
      application: voucher-platform
    distribution:
      percentiles-histogram:
        http.server.requests: true
        lock.acquisition.duration: true
        voucher.redemption.duration: true
      slo:
        http.server.requests: 10ms,50ms,100ms,200ms,500ms,1s,2s

# 감사 이벤트 Transactional Outbox 전달
audit:
  kafka:
    enabled: ${AUDIT_KAFKA_ENABLED:true}   # false면 브로커 없이 직접 relay(로컬/CI 기본 대안)
    topic: audit-events
    group: audit-log-writers
  outbox:
    poll-ms: 1000
    max-attempts: 5             # 전달/적용 실패 격리(quarantine) 임계
    reconcile-ms: 300000        # published-but-not-applied 재조정 주기(5분)
    reconcile-grace-ms: 600000  # 재조정 유예 — 최근 10분 내 행은 컨슈머 처리 중일 수 있어 제외
