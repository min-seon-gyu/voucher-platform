services:
  mysql:
    image: mysql:8.0
    container_name: voucher-mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_NAME:-voucher}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    command: --default-authentication-plugin=caching_sha2_password
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: voucher-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  # 감사 이벤트 Outbox 전달용 Kafka (KRaft, 단일 노드)
  kafka:
    image: apache/kafka:3.7.1
    container_name: voucher-kafka
    ports:
      - "29092:29092"                        # 호스트 디버깅용 (localhost:29092)
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # 컨테이너 내부(app)는 kafka:9092, 호스트는 localhost:29092 로 접속
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: voucher-system:local
    container_name: voucher-app
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-voucher}
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      AUDIT_KAFKA_ENABLED: "true"
      JWT_SECRET: ${JWT_SECRET:-local-dev-only-secret-key-minimum-256-bits-long-do-not-use-in-production!!}
      JAVA_OPTS: "-XX:MaxRAMPercentage=75.0"
    ports:
      - "8080:8080"
    restart: unless-stopped

  # ──────────────────────────────────────
  # 모니터링 스택 (Prometheus + Grafana)
  # ──────────────────────────────────────

  prometheus:
    image: prom/prometheus:latest
    container_name: voucher-prometheus
    ports:
      - "9090:9090"                        # http://localhost:9090 에서 Prometheus UI 접속
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml  # 수집 대상 설정
      - prometheus-data:/prometheus        # 메트릭 데이터 영속 저장
    extra_hosts:
      - "host.docker.internal:host-gateway"  # Docker 안에서 호스트(Spring Boot)에 접근

  grafana:
    image: grafana/grafana:latest
    container_name: voucher-grafana
    ports:
      - "3000:3000"                        # http://localhost:3000 에서 Grafana 접속
    environment:
      GF_SECURITY_ADMIN_USER: admin        # 초기 로그인 ID
      GF_SECURITY_ADMIN_PASSWORD: admin    # 초기 로그인 비밀번호
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning  # 데이터소스 + 대시보드 자동 설정
      - grafana-data:/var/lib/grafana      # 대시보드 변경 사항 영속 저장
    depends_on:
      - prometheus                         # Prometheus가 먼저 시작된 후 Grafana 시작

volumes:
  mysql-data:
  prometheus-data:
  grafana-data:
